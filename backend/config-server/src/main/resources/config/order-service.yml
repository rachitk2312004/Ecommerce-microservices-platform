server:
  port: 8084

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:mysql://${AIVEN_MYSQL_HOST:localhost}:${AIVEN_MYSQL_PORT:3306}/${ORDER_DB_NAME:ecommerce_order_db}?useSSL=${AIVEN_MYSQL_SSL:true}&requireSSL=${AIVEN_MYSQL_SSL:true}&serverTimezone=UTC
    username: ${AIVEN_MYSQL_USER:root}
    password: ${AIVEN_MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

app:
  jwt:
    secret: ${JWT_SECRET}
  internal:
    service-key: ${INTERNAL_SERVICE_KEY:dev-internal-key}

resilience4j:
  circuitbreaker:
    instances:
      productService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      inventoryService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      paymentService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      notificationService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
  retry:
    instances:
      productService:
        max-attempts: 3
        wait-duration: 500ms
      notificationService:
        max-attempts: 3
        wait-duration: 500ms

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

info:
  app:
    name: Order Service
