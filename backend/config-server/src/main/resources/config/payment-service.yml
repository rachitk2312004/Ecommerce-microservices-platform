server:
  port: 8085

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mysql://${AIVEN_MYSQL_HOST:localhost}:${AIVEN_MYSQL_PORT:3306}/${PAYMENT_DB_NAME:ecommerce_payment_db}?useSSL=${AIVEN_MYSQL_SSL:true}&requireSSL=${AIVEN_MYSQL_SSL:true}&serverTimezone=UTC
    username: ${AIVEN_MYSQL_USER:root}
    password: ${AIVEN_MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

app:
  jwt:
    secret: ${JWT_SECRET}
  internal:
    service-key: ${INTERNAL_SERVICE_KEY:dev-internal-key}
  payment:
    force-fail: ${PAYMENT_FORCE_FAIL:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

info:
  app:
    name: Payment Service
